name: Deploy to GitHub Pages

# Publishes the static app to GitHub Pages.
#
# ONE-TIME SETUP REQUIRED (the Actions token can't enable Pages for you):
#   Repo Settings -> Pages -> Build and deployment -> Source: "GitHub Actions",
#   then run this workflow manually (Actions tab -> "Deploy to GitHub Pages" ->
#   Run workflow). It deploys whatever is on the working branch.
#
# QUICKEST OPTION (recommended, no Actions needed): in Settings -> Pages choose
#   Source: "Deploy from a branch" -> this branch -> /(root). GitHub then serves
#   the files directly and auto-updates on every push. If you use that, you can
#   ignore this workflow entirely.
#
# Runs on pushes to the deployable branches (the github-pages environment's
# branch policy governs which of these may actually deploy), plus manual runs.
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - claude/fitness-dashboard-workout-library-467mrd

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The deploy step below only works when the Pages site is set to build
      # via Actions; flip it explicitly so the pipeline self-heals no matter
      # what Settings → Pages currently says.
      - name: Ensure Pages builds via Actions
        run: |
          curl -sf -X PUT \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            -d '{"build_type":"workflow"}' || echo "::warning::could not update Pages build_type"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
